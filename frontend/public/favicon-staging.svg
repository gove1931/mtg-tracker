<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ecfff"/>
      <stop offset="100%" stop-color="#4a9fd4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Gem: crown (top facet) -->
  <polygon points="16,4 26,14 6,14" fill="#c8f0ff"/>

  <!-- Gem: left pavilion -->
  <polygon points="6,14 16,28 16,14" fill="#5ab8e0"/>

  <!-- Gem: right pavilion -->
  <polygon points="26,14 16,28 16,14" fill="url(#right)"/>

  <!-- Girdle line -->
  <line x1="6" y1="14" x2="26" y2="14" stroke="#fff" stroke-width="0.4" opacity="0.3"/>

  <!-- Top highlight sparkle -->
  <polygon points="13.5,8.5 16,4 18.5,8.5 16,9.5" fill="white" opacity="0.35" filter="url(#glow)"/>
<g><circle cx="25.664" cy="6.336" r="7.04" fill="#f59e0b" stroke="#000" stroke-width="0.96"/><text x="25.664" y="8.8" font-family="Arial, sans-serif" font-size="9.152000000000001" font-weight="700" fill="#000" text-anchor="middle">β</text></g></svg>
