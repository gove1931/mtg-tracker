<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f1e3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ecfff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#7ecfff" stroke-opacity="0.05"/>
  <line x1="0" y1="314" x2="1200" y2="314" stroke="#7ecfff" stroke-opacity="0.05"/>
  <line x1="0" y1="471" x2="1200" y2="471" stroke="#7ecfff" stroke-opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Bar chart icon -->
  <g transform="translate(90, 185)">
    <rect x="0" y="0" width="120" height="160" rx="12" fill="#0f1e3a" stroke="#7ecfff" stroke-width="1.5" stroke-opacity="0.4"/>
    <rect x="20" y="100" width="20" height="45" rx="3" fill="#7ecfff" opacity="0.5"/>
    <rect x="50" y="70" width="20" height="75" rx="3" fill="#7ecfff" opacity="0.7"/>
    <rect x="80" y="40" width="20" height="105" rx="3" fill="#7ecfff" opacity="0.9"/>
    <line x1="15" y1="148" x2="105" y2="148" stroke="#7ecfff" stroke-opacity="0.4" stroke-width="1"/>
  </g>

  <!-- App name -->
  <text x="280" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="700" fill="white" letter-spacing="-1">MTG Arena Tracker</text>

  <!-- Description -->
  <text x="282" y="315" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" fill="white" opacity="0.65">アリーナの戦績を記録・分析</text>

  <!-- Divider -->
  <line x1="282" y1="356" x2="1100" y2="356" stroke="#7ecfff" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Tags -->
  <rect x="282" y="381" width="90" height="36" rx="18" fill="#7ecfff" opacity="0.12"/>
  <text x="327" y="404" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#7ecfff" text-anchor="middle">Vite</text>

  <!-- URL -->
  <text x="1100" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="white" opacity="0.35" text-anchor="end">mtg-tracker.goveapp.com</text>
</svg>
